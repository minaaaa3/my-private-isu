server {
  listen 80;
  client_max_body_size 10m;

  # 全体のルートを /var/www/html に統一します
  root /var/www/html;
  index index.php; # ← これが 403 を防ぐ鍵です

  location / {
    # まずファイル（画像など）があるか探し、なければ index.php に投げます
    try_files $uri $uri/ /index.php$is_args$args;
  }

  location ~ \.php$ {
    # appコンテナの9000番ポート（PHP-FPM）へ通訳
    fastcgi_pass app:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    
    # 実行するファイルのフルパスをPHP側に伝えます
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
  }
}